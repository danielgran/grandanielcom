name: Frontend CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    name: Build Nuxt app
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: "--max-old-space-size=8192"
    outputs:
      package_version: ${{ steps.build.outputs.PACKAGE_VERSION }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Build
        id: build
        run: |
          git config --global user.name "ci-bot"
          git config --global user.email "ci-bot@heartbeat.systems"
          
          # This is a workaround for the issue with the `npm version` command
          # in the GitHub Actions environment. It sets the user name and email
          # for the Git configuration, which is required for the `npm version` command.
          package_version=$(npm pkg get version | tr -d \")-${{ github.sha }}
          npm version $package_version
          echo "PACKAGE_VERSION=$package_version" >> $GITHUB_OUTPUT

          echo "${{ secrets.NUXT_ENV }}" > .env
          source .env
          cat .env

          npm run build

      - name: Store build artifact
        uses: actions/upload-artifact@v4
        with:
          name: hbts-frontend-artifact-${{ github.run_number }}
          path: .output
          include-hidden-files: true
          retention-days: 1

  deploy:
    name: Deploy Docker image
    if: ${{ github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v3

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: hbts-frontend-artifact-${{ github.run_number }}
          path: ".output"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        id: build-publish
        shell: bash
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ vars.AWS_ECR_REPOSITORY_FRONTEND }}
          IMAGE_TAG: ${{ needs.build.outputs.PACKAGE_VERSION }}

        run: |
          docker build . -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          # while still in dev latest tag makes sense, remove asa in prod
          docker tag "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY" --all-tags
          echo "IMAGE $IMAGE_TAG is pushed to $ECR_REGISTRY/$ECR_REPOSITORY"
          echo "image_tag=$IMAGE_TAG" 
          echo "full_image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"